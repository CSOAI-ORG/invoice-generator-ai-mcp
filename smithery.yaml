name: invoice-generator-ai-mcp
description: 'Invoice Generator Ai tools for AI agents. Capabilities: generate invoice,
  calculate totals, validate invoice. Built by MEOK AI Labs.'
version: 1.0.0
tools:
- name: generate_invoice
  description: Generate a professional invoice. Each item needs 'description', 'qty',
    and 'price' keys.
  parameters:
  - name: client
    type: string
    required: true
  - name: items
    type: array
    required: true
  - name: currency
    type: string
    required: false
  - name: tax_region
    type: string
    required: false
  - name: template
    type: string
    required: false
  - name: due_days
    type: integer
    required: false
  - name: notes
    type: string
    required: false
- name: calculate_totals
  description: Calculate subtotal, tax, discount, and grand total for a list of line
    items.
  parameters:
  - name: items
    type: array
    required: true
  - name: tax_region
    type: string
    required: false
  - name: discount_percent
    type: number
    required: false
- name: validate_invoice
  description: Validate an invoice dict for required fields, correct math, and common
    errors.
  parameters:
  - name: invoice
    type: object
    required: true
- name: list_templates
  description: List all available invoice templates with their details.
  parameters: []
